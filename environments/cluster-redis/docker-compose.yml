version: '3.8'

services:
  redis-master:
    image: redis:7-alpine
    container_name: redis-master
    ports:
      - "6379:6379"
    command: redis-server
    restart: always

  redis-replica-1:
    image: redis:7-alpine
    container_name: redis-replica-1
    ports:
      - "6380:6379"
    command: redis-server --replicaof redis-master 6379
    depends_on:
      - redis-master
    restart: always

  redis-replica-2:
    image: redis:7-alpine
    container_name: redis-replica-2
    ports:
      - "6381:6379"
    command: redis-server --replicaof redis-master 6379
    depends_on:
      - redis-master
    restart: always

  redis-sentinel-1:
    image: redis:7-alpine
    container_name: redis-sentinel-1
    ports:
      - "26379:26379"
    command: >
      sh -c "echo 'port 26379' > sentinel.conf &&
             echo 'sentinel resolve-hostnames yes' >> sentinel.conf &&
             echo 'sentinel announce-hostnames yes' >> sentinel.conf &&
             echo 'sentinel monitor mymaster redis-master 6379 2' >> sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 10000' >> sentinel.conf &&
             echo 'sentinel parallel-syncs mymaster 1' >> sentinel.conf &&
             redis-sentinel sentinel.conf"
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    restart: always

  redis-sentinel-2:
    image: redis:7-alpine
    container_name: redis-sentinel-2
    ports:
      - "26380:26379"
    command: >
      sh -c "echo 'port 26379' > sentinel.conf &&
             echo 'sentinel resolve-hostnames yes' >> sentinel.conf &&
             echo 'sentinel announce-hostnames yes' >> sentinel.conf &&
             echo 'sentinel monitor mymaster redis-master 6379 2' >> sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 10000' >> sentinel.conf &&
             echo 'sentinel parallel-syncs mymaster 1' >> sentinel.conf &&
             redis-sentinel sentinel.conf"
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    restart: always

  redis-sentinel-3:
    image: redis:7-alpine
    container_name: redis-sentinel-3
    ports:
      - "26381:26379"
    command: >
      sh -c "echo 'port 26379' > sentinel.conf &&
             echo 'sentinel resolve-hostnames yes' >> sentinel.conf &&
             echo 'sentinel announce-hostnames yes' >> sentinel.conf &&
             echo 'sentinel monitor mymaster redis-master 6379 2' >> sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 10000' >> sentinel.conf &&
             echo 'sentinel parallel-syncs mymaster 1' >> sentinel.conf &&
             redis-sentinel sentinel.conf"
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    restart: always
